<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - WorkSpace</title>
    <link rel="icon" href="coworking-spaces.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Auth loading overlay -->
    <div id="auth-loading-overlay">
        <i class="fas fa-building auth-logo"></i>
        <p>Verifying your session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="home.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
                    <img src="coworking-spaces.png" alt="WorkSpace" class="site-logo">
                    <span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="search-hubs.html">Find Spaces</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="transactions.html" class="active">Transactions</a></li>
                <li class="nav-user">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar-circle" id="user-avatar"></div>
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down" style="font-size:.7rem;opacity:.6;"></i>
                    </div>
                    <div id="user-dropdown" class="user-dropdown">
                        <div class="user-dropdown-info">
                            <div class="user-dropdown-avatar" id="user-dropdown-avatar"></div>
                            <div style="overflow:hidden;">
                                <div id="user-dropdown-name" class="user-dropdown-name"></div>
                                <div id="user-dropdown-email" class="user-dropdown-email"></div>
                            </div>
                        </div>
                        <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                        <a href="transactions.html"><i class="fas fa-receipt"></i> Transactions</a>
                        <a href="#" class="logout-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Transaction History</h1>
            <p>View all your payment transactions</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-receipt"></i>
                <div>
                    <h3 id="total-transactions">0</h3>
                    <p>Total Transactions</p>
                </div>
            </div>
            <div class="stat-card success">
                <i class="fas fa-check-circle"></i>
                <div>
                    <h3 id="successful-transactions">0</h3>
                    <p>Successful</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-rupee-sign"></i>
                <div>
                    <h3 id="total-spent">₹0</h3>
                    <p>Total Spent</p>
                </div>
            </div>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-transactions" placeholder="Search transactions..." oninput="filterTransactions()">
        </div>

        <div id="transactions-list" class="transactions-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
