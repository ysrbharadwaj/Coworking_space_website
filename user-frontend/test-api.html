<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        select {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <h1>API Connection Test</h1>

    <h2>Test Results:</h2>
    <div id="results"></div>

    <h2>City Dropdown:</h2>
    <select id="city-select">
        <option value="">Select City</option>
    </select>

    <h2>Raw API Response:</h2>
    <pre id="api-response"></pre>

    <script>
        const API_URL = 'http://localhost:3001/api';
        const resultsDiv = document.getElementById('results');
        const apiResponsePre = document.getElementById('api-response');
        const citySelect = document.getElementById('city-select');

        async function testAPI() {
            try {
                resultsDiv.innerHTML = '<p>Testing API connection...</p>';

                const response = await fetch(`${API_URL}/hubs`);
                resultsDiv.innerHTML += `<p class="success">✓ Fetch successful (Status: ${response.status})</p>`;

                const result = await response.json();
                resultsDiv.innerHTML += `<p class="success">✓ JSON parsed successfully</p>`;

                apiResponsePre.textContent = JSON.stringify(result, null, 2);

                const hubs = result.data || [];
                resultsDiv.innerHTML += `<p class="success">✓ Found ${hubs.length} hubs</p>`;

                const cities = [...new Set(hubs.map(hub => hub.city))];
                resultsDiv.innerHTML += `<p class="success">✓ Found ${cities.length} unique cities: ${cities.join(', ')}</p>`;

                // Populate dropdown
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });

                resultsDiv.innerHTML += `<p class="success">✓ Dropdown populated with ${citySelect.options.length - 1} cities</p>`;

            } catch (error) {
                resultsDiv.innerHTML += `<p class="error">✗ Error: ${error.message}</p>`;
                apiResponsePre.textContent = `Error: ${error.message}\n${error.stack}`;
            }
        }

        // Run test on page load
        testAPI();
    </script>
</body>

</html>
