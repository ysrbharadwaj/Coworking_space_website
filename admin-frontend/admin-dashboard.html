<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - WorkSpace</title>
    <link rel="icon" href="../user-frontend/coworking-spaces.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
            <span style="color:var(--text-light);font-size:.9rem;" id="last-updated"></span>
        </header>
        <div class="admin-content">
            <!-- Stats -->
            <div class="stats-row dashboard-stats-row" id="stats-row" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
            </div>

            <!-- Recent Bookings -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-calendar-check"></i> Recent Bookings</h2>
                    <a href="transactions-list.html" class="btn btn-secondary btn-sm">View All</a>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Guest</th>
                                    <th>Workspace</th>
                                    <th>Start</th>
                                    <th>Booked On</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-bookings">
                                <tr>
                                    <td colspan="7" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Hub Overview -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-building"></i> Hub Overview</h2>
                    <a href="hubs-list.html" class="btn btn-secondary btn-sm">Manage Hubs</a>
                </div>
                <div class="card-body">
                    <div id="hub-overview" class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                </div>
            </div>

            <!-- Analytics Charts -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem;">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-line"></i> Bookings Trend (Last 7 Days)</h2>
                    </div>
                    <div class="card-body">
                        <canvas id="bookings-chart" style="max-height:250px;"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-pie"></i> Booking Status Distribution</h2>
                    </div>
                    <div class="card-body">
                        <canvas id="status-chart" style="max-height:250px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>

</html>
