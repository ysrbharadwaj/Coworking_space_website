<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Workspace - WorkSpace</title>
    <link rel="icon" href="coworking-spaces.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Auth loading overlay -->
    <div id="auth-loading-overlay">
        <i class="fas fa-building auth-logo"></i>
        <p>Verifying your session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="home.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
                    <img src="coworking-spaces.png" alt="WorkSpace" class="site-logo">
                    <span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="search-hubs.html" class="active">Find Spaces</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li class="nav-user">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar-circle" id="user-avatar"></div>
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down" style="font-size:.7rem;opacity:.6;"></i>
                    </div>
                    <div id="user-dropdown" class="user-dropdown">
                        <div class="user-dropdown-info">
                            <div class="user-dropdown-avatar" id="user-dropdown-avatar"></div>
                            <div style="overflow:hidden;">
                                <div id="user-dropdown-name" class="user-dropdown-name"></div>
                                <div id="user-dropdown-email" class="user-dropdown-email"></div>
                            </div>
                        </div>
                        <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                        <a href="transactions.html"><i class="fas fa-receipt"></i> Transactions</a>
                        <a href="#" class="logout-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width:860px;padding-top:2rem;padding-bottom:3rem;">
        <div class="breadcrumb">
            <a href="search-hubs.html">Hubs</a>
            <span class="sep"></span>
            <a href="#" id="hub-back-link">Hub</a>
            <span class="sep"></span>
            <span id="workspace-name-bc">Workspace</span>
            <span class="sep"></span>
            <span>Book</span>
        </div>

        <div class="page-header" style="text-align:left;">
            <h1><i class="fas fa-calendar-check" style="color:var(--accent);"></i> Book Workspace</h1>
        </div>

        <!-- Workspace summary card -->
        <div id="workspace-summary" style="padding:1rem 1.25rem;background:var(--light);border-radius:8px;margin-bottom:1.5rem;">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
        </div>

        <!-- Booking Form -->
        <form id="booking-form" class="booking-form" novalidate>

            <h3 class="section-title" style="margin-bottom:1rem;color:var(--primary);">Booking Schedule</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="start-time">Start Date &amp; Time <span style="color:var(--danger)">*</span></label>
                    <input type="datetime-local" id="start-time"
                        data-validate="required|future|maxfuturedays:90" data-label="Start time"
                        onchange="onScheduleChange()">
                </div>
                <div class="form-group">
                    <label for="end-time">End Date &amp; Time <span style="color:var(--danger)">*</span></label>
                    <input type="datetime-local" id="end-time"
                        data-validate="required|afterField:start-time|maxduration:720" data-label="End time"
                        onchange="onScheduleChange()">
                </div>
            </div>

            <div class="form-group">
                <label for="booking-type">Booking Type <span style="color:var(--danger)">*</span></label>
                <select id="booking-type" data-validate="required" data-label="Booking Type" onchange="onScheduleChange()">
                    <option value="hourly">Hourly</option>
                    <option value="daily">Daily</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>

            <div id="availability-status" class="alert alert-info" style="display:none;"></div>

            <!-- Resources -->
            <div id="resources-section" class="resources-section">
                <h3>Additional Resources</h3>
                <div id="resources-list"><p style="color:var(--text-light);">Loading resources...</p></div>
            </div>

            <!-- Pricing Summary -->
            <div class="pricing-summary" id="pricing-summary">
                <div class="price-row"><span>Base Price:</span><span id="base-price">₹0</span></div>
                <div class="price-row"><span>Resources:</span><span id="resources-price">₹0</span></div>
                <div class="price-row total"><span>Total:</span><span id="total-price">₹0</span></div>
            </div>

            <div id="form-error" class="alert alert-error" style="display:none;"></div>

            <button type="submit" class="btn-primary btn-block" style="margin-top:1rem;">
                <i class="fas fa-credit-card"></i> Proceed to Payment
            </button>
        </form>
    </div>

    <script src="js/config.js"></script>
    <script src="js/booking-form.js"></script>
</body>
</html>
