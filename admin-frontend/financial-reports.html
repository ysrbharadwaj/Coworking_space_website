<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Reports - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-chart-bar"></i> Financial Reports</h1>
            <div style="display:flex;gap:.75rem;align-items:center;">
                <label style="font-size:.9rem;color:var(--text-light);">Period:</label>
                <select id="period" onchange="loadReport()"
                    style="padding:.5rem .75rem;border:1px solid var(--border);font-size:.9rem;">
                    <option value="7">Last 7 days</option>
                    <option value="30" selected>Last 30 days</option>
                    <option value="90">Last 90 days</option>
                    <option value="365">Last 12 months</option>
                </select>
            </div>
        </header>
        <div class="admin-content">
            <!-- KPI Cards -->
            <div class="stats-row">
                <div class="stat-card"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-rupee-sign"></i>
                    <div>
                        <div class="value" id="total-revenue">—</div>
                        <div class="label">Total Revenue</div>
                    </div>
                </div>
                <div class="stat-card green"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-calendar-check"></i>
                    <div>
                        <div class="value" id="total-bookings">—</div>
                        <div class="label">Total Bookings</div>
                    </div>
                </div>
                <div class="stat-card yellow"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-percentage"></i>
                    <div>
                        <div class="value" id="occupancy-rate">—</div>
                        <div class="label">Avg Occupancy</div>
                    </div>
                </div>
                <div class="stat-card"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-star"></i>
                    <div>
                        <div class="value" id="avg-rating">—</div>
                        <div class="label">Avg Rating</div>
                    </div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
                <!-- Revenue by Hub -->
                <div class="card">
                    <div class="card-header">
                        <h2>Revenue by Hub</h2>
                    </div>
                    <div class="card-body">
                        <div id="revenue-by-hub">
                            <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Bookings by Status -->
                <div class="card">
                    <div class="card-header">
                        <h2>Bookings by Status</h2>
                    </div>
                    <div class="card-body">
                        <div id="bookings-by-status">
                            <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Revenue by Workspace Type -->
                <div class="card">
                    <div class="card-header">
                        <h2>Revenue by Workspace Type</h2>
                    </div>
                    <div class="card-body">
                        <div id="revenue-by-type">
                            <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Top Workspaces -->
                <div class="card">
                    <div class="card-header">
                        <h2>Top 5 Workspaces</h2>
                    </div>
                    <div class="card-body">
                        <div id="top-workspaces">
                            <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/financial-reports.js"></script>
</body>

</html>
