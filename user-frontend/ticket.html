<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Ticket - WorkSpace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #dfe6e9;
            --light: #ecf0f1;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
        }

        .ticket-container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 2px 10px var(--shadow);
            margin: 0 auto;
            border: 1px solid var(--border);
        }

        .ticket-header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            border-bottom: 3px solid var(--accent);
        }

        .ticket-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .ticket-header .booking-id {
            font-size: 0.875rem;
            opacity: 0.9;
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--success);
            color: white;
            font-weight: 600;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ticket-body {
            padding: 2rem;
        }

        .section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
        }

        .section-title i {
            color: var(--accent);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1rem;
            color: var(--text);
            font-weight: 600;
        }

        .info-value.large {
            font-size: 1.25rem;
            color: var(--primary);
        }

        .amenities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .amenity-tag {
            background: var(--light);
            color: var(--text);
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            font-weight: 500;
        }

        .resources-list {
            background: var(--light);
            padding: 1rem;
            margin-top: 1rem;
            border-left: 3px solid var(--accent);
        }

        .resource-item {
            padding: 0.75rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .resource-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .price-breakdown {
            background: var(--light);
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        .price-row:last-child {
            border-bottom: none;
        }

        .price-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            border-top: 2px solid var(--primary);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .qr-section {
            text-align: center;
            padding: 2rem;
            background: var(--light);
            border: 1px solid var(--border);
            margin-top: 1rem;
        }

        .qr-code {
            background: white;
            padding: 1rem;
            display: inline-block;
            border: 2px solid var(--border);
        }

        .qr-code img {
            display: block;
            max-width: 250px;
            height: auto;
        }

        .qr-instruction {
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .ticket-footer {
            background: var(--primary);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 3px solid var(--accent);
        }

        .ticket-footer p {
            margin: 0.5rem 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--primary);
        }

        .loading i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
            color: var(--accent);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: white;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid var(--border);
            box-shadow: 0 2px 10px var(--shadow);
        }

        .error i {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 1rem;
        }

        .error h2 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .error p {
            color: var(--text-light);
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .ticket-container {
                box-shadow: none;
                border: none;
            }

            .action-buttons,
            .btn {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .ticket-container {
                margin: 0;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="ticket-container" id="ticket-container">
        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p style="margin-top: 1rem; font-size: 1.2rem;">Loading your ticket...</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';

        // Get booking ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        const qrValue = urlParams.get('qr');

        if (!bookingId && !qrValue) {
            showError('Invalid ticket link. No booking ID or QR code provided.');
        } else {
            loadBookingDetails();
        }

        async function loadBookingDetails() {
            try {
                let endpoint = `${API_URL}/bookings/ticket/${bookingId}`;
                if (qrValue) {
                    endpoint = `${API_URL}/qr/ticket?qr=${encodeURIComponent(qrValue)}`;
                }

                const response = await fetch(endpoint);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'Failed to load booking details');
                }

                displayTicket(result.data);
            } catch (error) {
                console.error('Error loading booking:', error);
                showError('Could not load your ticket. Please try again or contact support.');
            }
        }

        function displayTicket(data) {
            const booking = data.booking;
            const workspace = data.workspace;
            const hub = data.hub;
            const resources = data.resources || [];
            const qrImage = data.qr_image;

            const startDate = new Date(booking.start_time);
            const endDate = new Date(booking.end_time);

            const ticketHTML = `
                <div class="ticket-header">
                    <h1>BOOKING CONFIRMATION & ENTRY TICKET</h1>
                    <div class="booking-id">BOOKING ID: #${booking.id}</div>
                    <div class="status-badge">
                        ${booking.status.toUpperCase()}
                    </div>
                </div>

                <div class="ticket-body">
                    <!-- Guest Details -->
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-user"></i>
                            Guest Details
                        </div>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Name</div>
                                <div class="info-value">${booking.user_name}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Email</div>
                                <div class="info-value">${booking.user_email || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Booking Type</div>
                                <div class="info-value">${booking.booking_type.toUpperCase()}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Venue Details -->
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-building"></i>
                            Venue Details
                        </div>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Workspace</div>
                                <div class="info-value large">${workspace.name}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Type</div>
                                <div class="info-value">${formatType(workspace.type)}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Capacity</div>
                                <div class="info-value">${workspace.capacity} People</div>
                            </div>
                        </div>
                        <div class="info-grid" style="margin-top: 1.5rem;">
                            <div class="info-item">
                                <div class="info-label">Location</div>
                                <div class="info-value">${hub.name}</div>
                                <p style="color: var(--text-light); margin-top: 0.5rem; font-size: 0.9rem;">
                                    ${hub.address}<br>
                                    ${hub.city}, ${hub.state} - ${hub.pincode}
                                </p>
                            </div>
                        </div>
                        ${workspace.amenities && workspace.amenities.length > 0 ? `
                            <div style="margin-top: 1.5rem;">
                                <div class="info-label" style="margin-bottom: 0.75rem;">Available Amenities</div>
                                <div class="amenities-list">
                                    ${workspace.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Booking Schedule -->
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-calendar-alt"></i>
                            Booking Schedule
                        </div>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Check-in</div>
                                <div class="info-value large">${startDate.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                                <p style="color: var(--primary); margin-top: 0.5rem; font-size: 1rem; font-weight: 600;">
                                    ${startDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}
                                </p>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Check-out</div>
                                <div class="info-value large">${endDate.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                                <p style="color: var(--primary); margin-top: 0.5rem; font-size: 1rem; font-weight: 600;">
                                    ${endDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}
                                </p>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Duration</div>
                                <div class="info-value">${calculateDuration(startDate, endDate, booking.booking_type)}</div>
                            </div>
                        </div>
                    </div>

                    ${resources.length > 0 ? `
                        <div class="section">
                            <div class="section-title">
                                <i class="fas fa-plus-circle"></i>
                                Additional Resources
                            </div>
                            <div class="resources-list">
                                ${resources.map(r => `
                                    <div class="resource-item">
                                        <div>
                                            <strong>${r.name}</strong>
                                            ${r.description ? `<p style="color: var(--text-light); font-size: 0.85rem; margin-top: 0.25rem;">${r.description}</p>` : ''}
                                        </div>
                                        <div style="color: var(--accent); font-weight: 600;">₹${r.price_per_slot}/hr</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <!-- Payment Summary -->
                    <div class="section">
                        <div class="section-title">
                            <i class="fas fa-receipt"></i>
                            Payment Summary
                        </div>
                        <div class="price-breakdown">
                            <div class="price-row">
                                <span>Booking Amount</span>
                                <span>₹${booking.total_price.toFixed(2)}</span>
                            </div>
                            <div class="price-row total">
                                <span>Total Paid</span>
                                <span>₹${booking.total_price.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>

                    <!-- QR Code -->
                    ${qrImage ? `
                        <div class="section">
                            <div class="qr-section">
                                <div class="section-title" style="justify-content: center;">
                                    <i class="fas fa-qrcode"></i>
                                    Entry QR Code
                                </div>
                                <div class="qr-code">
                                    <img src="${qrImage}" alt="QR Code">
                                </div>
                                <div class="qr-instruction">
                                    <i class="fas fa-info-circle"></i> 
                                    Show this QR code at the venue for entry
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    <!-- Actions -->
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i>
                            Print Ticket
                        </button>
                        <button class="btn btn-secondary" onclick="downloadTicket()">
                            <i class="fas fa-download"></i>
                            Download PDF
                        </button>
                    </div>
                </div>

                <div class="ticket-footer">
                    <p><strong>WorkSpace Co-Working Platform</strong></p>
                    <p>For any queries, please contact support@workspace.com</p>
                    <p style="font-size: 0.85rem; margin-top: 1rem;">
                        This is a computer-generated ticket and does not require a signature. 
                        Please present this ticket along with a valid ID at the venue.
                    </p>
                </div>
            `;

            document.getElementById('ticket-container').innerHTML = ticketHTML;
        }

        function formatType(type) {
            const types = {
                'hotdesk': 'Hot Desk',
                'cabin': 'Private Cabin',
                'meeting_room': 'Meeting Room',
                'conference': 'Conference Hall'
            };
            return types[type] || type;
        }

        function calculateDuration(start, end, type) {
            const hours = Math.round((end - start) / (1000 * 60 * 60));
            const days = Math.round(hours / 24);

            if (type === 'hourly') {
                return hours === 1 ? '1 hour' : `${hours} hours`;
            } else if (type === 'daily') {
                return days === 1 ? '1 day' : `${days} days`;
            } else if (type === 'monthly') {
                return '1 month';
            }
            return `${hours} hours`;
        }

        function showError(message) {
            document.getElementById('ticket-container').innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Oops! Something went wrong</h2>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'" style="margin-top: 2rem;">
                        <i class="fas fa-home"></i> Go to Home
                    </button>
                </div>
            `;
        }

        function downloadTicket() {
            window.print();
        }
    </script>
</body>

</html>
