<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - WorkSpace</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="auth.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;">
                    <i class="fas fa-building"></i><span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu" style="gap:1rem;">
                <li style="color:var(--text-light);font-size:.9rem;display:flex;align-items:center;gap:.4rem;">
                    <i class="fas fa-lock" style="color:var(--accent);font-size:.8rem;"></i>
                    Secure Login
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Tab Navigation -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button class="auth-tab" onclick="switchTab('register')">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <h2>Welcome Back</h2>
                    <p>Login to access your workspace bookings</p>
                    
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="email" 
                                    id="login-email" 
                                    placeholder="Enter your email"
                                    data-validate="required|email"
                                    data-label="Email"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="login-password" 
                                    placeholder="Enter your password"
                                    data-validate="required"
                                    data-label="Password"
                                    required
                                >
                                <button type="button" class="password-toggle" onclick="togglePassword('login-password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="remember-me">
                                <span class="checkmark"></span>
                                Remember me
                            </label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn-primary auth-btn">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-login">
                        <div id="google-signin-button-login"></div>
                        <!-- <button class="social-btn facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button> -->
                    </div>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <h2>Create Account</h2>
                    <p>Join us to book your perfect workspace</p>
                    
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label for="register-name">Full Name</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input 
                                    type="text" 
                                    id="register-name" 
                                    placeholder="Enter your full name"
                                    data-validate="required|minlen:2|maxlen:100"
                                    data-label="Full Name"
                                    maxlength="100"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="register-email">Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="email" 
                                    id="register-email" 
                                    placeholder="Enter your email"
                                    data-validate="required|email"
                                    data-label="Email"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="register-phone">Phone Number (Optional)</label>
                            <div class="input-group">
                                <i class="fas fa-phone"></i>
                                <input 
                                    type="tel" 
                                    id="register-phone" 
                                    placeholder="Enter your phone number"
                                    data-validate="phone"
                                    data-label="Phone Number"
                                    maxlength="20"
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="register-password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="register-password" 
                                    placeholder="Create a password (min 8 characters)"
                                    data-validate="required|minlen:8|maxlen:128"
                                    data-label="Password"
                                    maxlength="128"
                                    required
                                >
                                <button type="button" class="password-toggle" onclick="togglePassword('register-password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="register-confirm">Confirm Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="register-confirm" 
                                    placeholder="Confirm your password"
                                    data-validate="required|match:register-password"
                                    data-label="Confirm Password"
                                    maxlength="128"
                                    required
                                >
                                <button type="button" class="password-toggle" onclick="togglePassword('register-confirm')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="agree-terms" required>
                                <span class="checkmark"></span>
                                I agree to the <a href="#" class="terms-link">Terms & Conditions</a>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary auth-btn">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>or sign up with</span>
                    </div>

                    <div class="social-login">
                        <div id="google-signin-button-register"></div>
                        <button class="social-btn facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
