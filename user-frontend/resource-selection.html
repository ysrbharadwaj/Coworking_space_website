<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Resources - WorkSpace</title>
    <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="coworking-spaces.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Auth loading overlay -->
    <div id="auth-loading-overlay">
        <i class="fas fa-building auth-logo"></i>
        <p>Verifying your session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="home.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
                    <img src="coworking-spaces.png" alt="WorkSpace" class="site-logo">
                    <span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="search-hubs.html" class="active">Find Spaces</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li class="nav-user">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar-circle" id="user-avatar"></div>
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down" style="font-size:.7rem;opacity:.6;"></i>
                    </div>
                    <div id="user-dropdown" class="user-dropdown">
                        <div class="user-dropdown-info">
                            <div class="user-dropdown-avatar" id="user-dropdown-avatar"></div>
                            <div style="overflow:hidden;">
                                <div id="user-dropdown-name" class="user-dropdown-name"></div>
                                <div id="user-dropdown-email" class="user-dropdown-email"></div>
                            </div>
                        </div>
                        <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                        <a href="transactions.html"><i class="fas fa-receipt"></i> Transactions</a>
                        <a href="#" class="logout-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width:800px;padding-top:2rem;padding-bottom:3rem;">
        <div class="breadcrumb">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="page-header" style="text-align:left;">
            <h1><i class="fas fa-plus-circle" style="color:var(--accent);"></i> Add-On Resources</h1>
            <p>Select additional resources to enhance your workspace experience</p>
        </div>

        <!-- Booking Duration Summary -->
        <div id="duration-summary"
            style="background:var(--light);padding:1rem 1.25rem;border-radius:8px;margin-bottom:1.5rem;display:flex;gap:2rem;flex-wrap:wrap;">
            <div><span style="font-size:.8rem;color:var(--text-light);">DURATION</span><br><strong id="duration-label">—</strong></div>
            <div><span style="font-size:.8rem;color:var(--text-light);">START</span><br><strong id="start-label">—</strong></div>
            <div><span style="font-size:.8rem;color:var(--text-light);">END</span><br><strong id="end-label">—</strong></div>
        </div>

        <div id="resources-container">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading resources...</p></div>
        </div>

        <!-- Running Total -->
        <div style="position:sticky;bottom:0;background:white;border-top:1px solid var(--border);padding:1.25rem;margin-top:2rem;border-radius:8px;box-shadow:0 -2px 10px var(--shadow);">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
                <div>
                    <div style="font-size:.85rem;color:var(--text-light);">Resources Total</div>
                    <div id="resources-total" style="font-size:1.75rem;font-weight:700;color:var(--primary);">₹0</div>
                </div>
                <div style="display:flex;gap:.75rem;">
                    <button class="btn-secondary" onclick="clearAll()">
                        <i class="fas fa-times"></i> Clear All
                    </button>
                    <button class="btn-primary" onclick="confirmSelection()">
                        <i class="fas fa-check"></i> Confirm &amp; Continue
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/resource-selection.js"></script>
</body>
</html>
