<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspaces - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-couch"></i> Workspaces</h1> <span style="color:var(--text-light);font-size:.9rem;"
                id="last-updated"></span> <a href="workspace-form.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Workspace
            </a>
        </header>
        <div class="admin-content">
            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search workspaces..." oninput="filterWorkspaces()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-hub" onchange="filterWorkspaces()">
                        <option value="">All Hubs</option>
                    </select>
                </div>
                <div class="toolbar-filter">
                    <select id="filter-type" onchange="filterWorkspaces()">
                        <option value="">All Types</option>
                        <option value="hotdesk">Hot Desk</option>
                        <option value="cabin">Private Cabin</option>
                        <option value="meeting_room">Meeting Room</option>
                        <option value="conference">Conference Hall</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Hub</th>
                                    <th>Type</th>
                                    <th>Capacity</th>
                                    <th>Base Price</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="workspaces-table">
                                <tr>
                                    <td colspan="9" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/workspaces-list.js"></script>
</body>

</html>
