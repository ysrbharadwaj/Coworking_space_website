<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Rule Form - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1 id="page-title"><i class="fas fa-tags"></i> Add Pricing Rule</h1>
            <a href="pricing-rules-list.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Rules
            </a>
        </header>
        <div class="admin-content">
            <div class="card" style="max-width:720px;">
                <div class="card-header">
                    <h2 id="form-heading">Pricing Rule Details</h2>
                </div>
                <div class="card-body">
                    <form id="pricing-rule-form" novalidate>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="workspace_id">Workspace <span style="color:var(--danger)">*</span></label>
                                <select id="workspace_id" name="workspace_id" required>
                                    <option value="">-- Select Workspace --</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="rule_type">Rule Type <span style="color:var(--danger)">*</span></label>
                                <select id="rule_type" name="rule_type" required>
                                    <option value="">-- Select Type --</option>
                                    <option value="peak_hours">Peak Hours</option>
                                    <option value="weekend">Weekend</option>
                                    <option value="demand">High Demand</option>
                                    <option value="time_based">Time Based</option>
                                    <option value="day_based">Day Based</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="percentage_modifier">Percentage Modifier (%)</label>
                                <input type="number" id="percentage_modifier" name="percentage_modifier" step="0.1"
                                    placeholder="e.g. 15 for +15%, -10 for -10%">
                                <span class="form-hint">Positive = increase, Negative = discount</span>
                            </div>
                            <div class="form-group">
                                <label for="flat_modifier">Flat Modifier (₹)</label>
                                <input type="number" id="flat_modifier" name="flat_modifier" step="0.01"
                                    placeholder="e.g. 200 for +₹200, -100 for -₹100">
                                <span class="form-hint">Fixed amount to add/subtract</span>
                            </div>
                            <div class="form-group">
                                <label for="start_time">Start Time (Optional)</label>
                                <input type="time" id="start_time" name="start_time" placeholder="09:00">
                                <span class="form-hint">When rule starts applying</span>
                            </div>
                            <div class="form-group">
                                <label for="end_time">End Time (Optional)</label>
                                <input type="time" id="end_time" name="end_time" placeholder="17:00">
                                <span class="form-hint">When rule stops applying</span>
                            </div>
                            <div class="form-group full">
                                <label>Active Days (Optional - leave empty for all days)</label>
                                <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem;">
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Mon"> Mon
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Tue"> Tue
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Wed"> Wed
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Thu"> Thu
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Fri"> Fri
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Sat"> Sat
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 0.3rem; cursor: pointer;">
                                        <input type="checkbox" name="day" value="Sun"> Sun
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div id="form-error" class="alert alert-error" style="display:none;margin-top:1rem;"></div>

                        <div class="form-actions">
                            <a href="pricing-rules-list.html" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" id="submit-btn">
                                <i class="fas fa-save"></i> Save Rule
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/pricing-rule-form.js"></script>
</body>

</html>
