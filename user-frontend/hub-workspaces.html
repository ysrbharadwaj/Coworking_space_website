<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Workspaces - WorkSpace</title>
    <link rel="icon" href="coworking-spaces.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Auth loading overlay -->
    <div id="auth-loading-overlay">
        <i class="fas fa-building auth-logo"></i>
        <p>Verifying your session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="home.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
                    <img src="coworking-spaces.png" alt="WorkSpace" class="site-logo">
                    <span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="search-hubs.html" class="active">Find Spaces</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li class="nav-user">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar-circle" id="user-avatar"></div>
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down" style="font-size:.7rem;opacity:.6;"></i>
                    </div>
                    <div id="user-dropdown" class="user-dropdown">
                        <div class="user-dropdown-info">
                            <div class="user-dropdown-avatar" id="user-dropdown-avatar"></div>
                            <div style="overflow:hidden;">
                                <div id="user-dropdown-name" class="user-dropdown-name"></div>
                                <div id="user-dropdown-email" class="user-dropdown-email"></div>
                            </div>
                        </div>
                        <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                        <a href="transactions.html"><i class="fas fa-receipt"></i> Transactions</a>
                        <a href="#" class="logout-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <!-- Breadcrumb -->
        <div class="breadcrumb" style="margin-top:1.5rem;">
            <a href="search-hubs.html"><i class="fas fa-arrow-left"></i> Back to Hubs</a>
        </div>

        <!-- Hub Info Header -->
        <div class="hub-header">
            <div class="hub-header-info">
                <h2 id="hub-name">Loading...</h2>
                <p id="hub-address"></p>
            </div>
            <a href="search-hubs.html" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> All Hubs
            </a>
        </div>

        <!-- Filters -->
        <div class="search-filters">
            <div class="filter-group">
                <label>Workspace Type</label>
                <select id="filter-type" onchange="filterWorkspaces()">
                    <option value="">All Types</option>
                    <option value="hotdesk">Hot Desk</option>
                    <option value="cabin">Private Cabin</option>
                    <option value="meeting_room">Meeting Room</option>
                    <option value="conference">Conference Hall</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Capacity</label>
                <select id="filter-capacity" onchange="filterWorkspaces()">
                    <option value="">Any</option>
                    <option value="1-5">1-5 people</option>
                    <option value="6-10">6-10 people</option>
                    <option value="11-20">11-20 people</option>
                    <option value="21+">21+ people</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Availability</label>
                <select id="filter-availability" onchange="filterWorkspaces()">
                    <option value="">All</option>
                    <option value="available">Available Only</option>
                    <option value="unavailable">Unavailable</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sort-by" onchange="filterWorkspaces()">
                    <option value="">Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="capacity-low">Capacity: Low to High</option>
                    <option value="capacity-high">Capacity: High to Low</option>
                </select>
            </div>
        </div>

        <div id="workspaces-grid" class="workspaces-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading workspaces...</p></div>
        </div>

        <!-- Amenities Section -->
        <div id="amenities-section" class="amenities-section" style="display: none;">
            <h3>Amenities</h3>
            <div id="amenities-grid" class="amenities-grid"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/hub-workspaces.js"></script>
</body>
</html>
