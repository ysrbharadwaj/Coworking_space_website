<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - WorkSpace</title>
    <link rel="icon" href="coworking-spaces.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Auth loading overlay -->
    <div id="auth-loading-overlay">
        <i class="fas fa-building auth-logo"></i>
        <p>Verifying your session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="home.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
                    <img src="coworking-spaces.png" alt="WorkSpace" class="site-logo">
                    <span>WorkSpace</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="search-hubs.html">Find Spaces</a></li>
                <li><a href="my-bookings.html">My Bookings</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li class="nav-user">
                    <div class="user-menu" onclick="toggleUserMenu()">
                        <div class="user-avatar-circle" id="user-avatar"></div>
                        <span id="user-name"></span>
                        <i class="fas fa-chevron-down" style="font-size:.7rem;opacity:.6;"></i>
                    </div>
                    <div id="user-dropdown" class="user-dropdown">
                        <div class="user-dropdown-info">
                            <div class="user-dropdown-avatar" id="user-dropdown-avatar"></div>
                            <div style="overflow:hidden;">
                                <div id="user-dropdown-name" class="user-dropdown-name"></div>
                                <div id="user-dropdown-email" class="user-dropdown-email"></div>
                            </div>
                        </div>
                        <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                        <a href="transactions.html"><i class="fas fa-receipt"></i> Transactions</a>
                        <a href="#" class="logout-link" onclick="logout();return false;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width:520px;padding-top:3rem;padding-bottom:3rem;text-align:center;">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h2 style="font-size:2rem;color:var(--primary);margin-bottom:.5rem;">Payment Successful!</h2>
        <p style="color:var(--text-light);margin-bottom:2rem;">Your booking has been confirmed.</p>

        <div id="booking-summary" style="background:var(--light);padding:1.5rem;border-radius:8px;text-align:left;margin-bottom:2rem;"></div>

        <div class="qr-code-container">
            <div id="qr-container">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading QR code...</p></div>
            </div>
        </div>
        <p class="small-text">Show this QR code at the venue for check-in</p>

        <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;">
            <a href="my-bookings.html" class="btn-primary">
                <i class="fas fa-list"></i> View My Bookings
            </a>
            <a href="search-hubs.html" class="btn-secondary">
                <i class="fas fa-search"></i> Book Another
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/booking-confirmation.js"></script>
</body>
</html>
