<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-users"></i> Users</h1>
            <span style="color:var(--text-light);font-size:.9rem;" id="last-updated"></span>
        </header>
        <div class="admin-content">
            <!-- Stats -->
            <div class="stats-row" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="stat-card"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-users"></i>
                    <div>
                        <div class="value" id="total-users">—</div>
                        <div class="label">Total Users</div>
                    </div>
                </div>
                <div class="stat-card green"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-calendar-check"></i>
                    <div>
                        <div class="value" id="total-user-bookings">—</div>
                        <div class="label">Total Bookings</div>
                    </div>
                </div>
                <div class="stat-card yellow"
                    style="border:1px solid var(--accent);border-radius:0;box-shadow:0 6px 18px rgba(198, 169, 105, .08);">
                    <i class="fas fa-user-clock"></i>
                    <div>
                        <div class="value" id="active-users">—</div>
                        <div class="label">Active This Month</div>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search by name or email..." oninput="filterUsers()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-city" onchange="filterUsers()">
                        <option value="">All Cities</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Total Bookings</th>
                                    <th>Total Spent</th>
                                    <th>Last Booking</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="users-table">
                                <tr>
                                    <td colspan="7" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/users-list.js"></script>
</body>

</html>
