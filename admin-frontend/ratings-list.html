<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <h1><i class="fas fa-star"></i> Reviews & Ratings</h1>
            <span style="color:var(--text-light);font-size:.9rem;" id="last-updated"></span>
        </header>
        <div class="admin-content">
            <!-- Stats -->
            <div class="stats-row" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div>
                        <div class="value" id="total-ratings">—</div>
                        <div class="label">Total Reviews</div>
                    </div>
                </div>
                <div class="stat-card green">
                    <i class="fas fa-star-half-alt"></i>
                    <div>
                        <div class="value" id="avg-rating">—</div>
                        <div class="label">Average Rating</div>
                    </div>
                </div>
                <div class="stat-card yellow">
                    <i class="fas fa-thumbs-up"></i>
                    <div>
                        <div class="value" id="positive-ratings">—</div>
                        <div class="label">4+ Stars</div>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="toolbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search reviews..." oninput="filterRatings()">
                </div>
                <div class="toolbar-filter">
                    <select id="filter-rating" onchange="filterRatings()">
                        <option value="">All Ratings</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Rating</th>
                                    <th>Workspace</th>
                                    <th>Hub</th>
                                    <th>Review</th>
                                    <th>Booking ID</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ratings-table">
                                <tr>
                                    <td colspan="8" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/ratings-list.js"></script>
</body>

</html>
