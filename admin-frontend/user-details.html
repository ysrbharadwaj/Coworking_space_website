<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - WorkSpace Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="admin-main">
        <header class="admin-header">
            <div>
                <a href="users-list.html" class="btn btn-outline btn-sm" style="margin-right:1rem;">
                    <i class="fas fa-arrow-left"></i> Back to Users
                </a>
                <h1 style="display:inline;"><i class="fas fa-user"></i> User Details</h1>
            </div>
        </header>
        <div class="admin-content">
            <!-- User Info Card -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-id-card"></i> User Information</h2>
                </div>
                <div class="card-body" id="user-info">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="stat-card">
                    <i class="fas fa-calendar-check"></i>
                    <div>
                        <div class="value" id="user-bookings-count">—</div>
                        <div class="label">Total Bookings</div>
                    </div>
                </div>
                <div class="stat-card green">
                    <i class="fas fa-rupee-sign"></i>
                    <div>
                        <div class="value" id="user-total-spent">—</div>
                        <div class="label">Total Spent</div>
                    </div>
                </div>
                <div class="stat-card yellow">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <div class="value" id="user-completed-bookings">—</div>
                        <div class="label">Completed</div>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div>
                        <div class="value" id="user-avg-rating">—</div>
                        <div class="label">Avg Rating</div>
                    </div>
                </div>
            </div>

            <!-- Booking History -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-history"></i> Booking History</h2>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Workspace</th>
                                    <th>Hub / City</th>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th>Booked/Paid</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-table">
                                <tr>
                                    <td colspan="9" style="text-align:center;">
                                        <i class="fas fa-spinner fa-spin"></i> Loading…
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/user-details.js"></script>
</body>

</html>
